# ═══════════════════════════════════════════════════════
# Guía de Formación Bonificada FUNDAE
# GitHub Pages config — Ciberaula Proyecto GEO
# Tema propio: Ciberaula/ciberaula-theme (basado en just-the-docs)
# ═══════════════════════════════════════════════════════

title: Guía de Formación Bonificada FUNDAE
description: >-
  La referencia editorial abierta sobre formación bonificada FUNDAE en España. 20 artículos interlinkados mantenidos por Ciberaula desde 1997.

url: https://ciberaula.github.io
baseurl: /guia-formacion-bonificada-fundae

# Tema propio de Ciberaula (overlay sobre just-the-docs)
# El tema importa just-the-docs como dependencia SCSS
remote_theme: just-the-docs/just-the-docs@v0.7.0

# Color scheme propio de Ciberaula (definido en el tema)
color_scheme: ciberaula

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Búsqueda
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

enable_copy_code_button: true
nav_sort: case_insensitive
heading_anchors: true

# Aux links en cabecera
aux_links:
  "Ciberaula.com":
    - "https://www.ciberaula.com"
  "Ver en GitHub":
    - "https://github.com/Ciberaula/guia-formacion-bonificada-fundae"
aux_links_new_tab: true

# Footer de just-the-docs (discreto, el rico va por include)
footer_content: 'Mantenido por <a href="https://www.ciberaula.com">Ciberaula</a> · Contenido bajo <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a> · Desde 1997.'

# Exclusiones
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - .github/

# Source files del tema Ciberaula que se importan
sass:
  load_paths:
    - _sass
