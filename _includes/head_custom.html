<link rel="stylesheet" href="{{ '/assets/css/ciberaula.css' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  /* Layout centrado — sidebar + main + banner se centran juntos respecto al viewport.
     A partir de lg (>=66.5rem), el tema just-the-docs ocupa calc(50% + 33.25rem).
     Sobrante horizontal: calc(50% - 33.25rem).
     Para centrar: desplazar todo a la derecha calc(25% - 16.625rem). */
  .ciberaula-banner-fullwidth {
    width: 100%;
    line-height: 0;
    background: #0d2137;
  }
  .ciberaula-banner-fullwidth img {
    width: 100%;
    height: auto;
    display: block;
  }
  @media (min-width: 66.5rem) {
    .side-bar {
      left: calc(25% - 16.625rem);
    }
    .main {
      margin-left: calc(75% - 33.375rem);
    }
    .ciberaula-banner-fullwidth {
      width: calc(50% + 33.25rem);
      margin-left: calc(25% - 16.625rem);
    }
  }
  .main-content > p:first-child:has(img[src*="banner"]) {
    display: none !important;
  }
</style>
